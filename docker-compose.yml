services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-htd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CloudTraining@2016}
      POSTGRES_DB: ${POSTGRES_DB:-htd_training}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - htd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-htd} -d ${POSTGRES_DB:-htd_training}",
        ]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  htd_pgdata:
