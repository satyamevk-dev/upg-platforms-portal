services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: satyamevk
      POSTGRES_DB: htd_training
      # Local dev only: allows passwordless TCP connections as satyamevk (matches DATABASE_URL without a password).
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - htd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satyamevk -d htd_training"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  htd_pgdata:
